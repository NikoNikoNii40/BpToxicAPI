# cloudbuild.yaml
steps:
  # 1) Download model from GCS into workspace
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        echo "PWD=$(pwd)"
        echo "Downloading model from GCS..."
        mkdir -p models/xlmr-toxic-v2_1
        gsutil -m rsync -r gs://bp-toxicapi-models/models/xlmr-toxic-v2_1 models/xlmr-toxic-v2_1

        echo "Model listing:"
        ls -lah models/xlmr-toxic-v2_1

        python - <<'PY'
        from pathlib import Path
        p = Path("models/xlmr-toxic-v2_1/model.safetensors")
        b = p.read_bytes()[:64]
        print("SIZE_BYTES:", p.stat().st_size)
        print("FIRST_BYTES:", b)
        if p.stat().st_size < 500_000_000:
            raise SystemExit("FAIL: model too small (download failed / wrong file)")
        if b.startswith(b"version https://git-lfs.github.com/spec/v1"):
            raise SystemExit("FAIL: model is Git LFS pointer, not real safetensors")
        PY

  # 2) Build Docker image (now model exists in context)
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/bptoxicapi/api:$COMMIT_SHA
      - .

  # 3) Push image
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/bptoxicapi/api:$COMMIT_SHA

  # 4) Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    args:
      - gcloud
      - run
      - deploy
      - api
      - --image
      - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/bptoxicapi/api:$COMMIT_SHA
      - --region
      - europe-west1
      - --memory
      - 4Gi
      - --cpu
      - "2"
      - --execution-environment
      - gen2
      - --cpu-boost
      - --timeout
      - "300"
      - --allow-unauthenticated

images:
  - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/bptoxicapi/api:$COMMIT_SHA